# Alembic 配置。CLI 入口 news-ingestion 在代码里覆盖 script_location 与 sqlalchemy.url，
# 此文件仅为兼容 ``alembic`` 原生命令与文档可读性保留。
[alembic]
script_location = migrations
sqlalchemy.url =
# SQLite 用 batch 模式，便于未来 ALTER TABLE
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
